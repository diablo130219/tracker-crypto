<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CryptoNow Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body brand-login">
  <main class="login-card brand-login-card">
    <div class="login-logo-wrap">
      <img src="/static/cryptonow_icon.png" alt="CryptoNow" class="login-logo animated-icon">
    </div>
    <h1>CryptoNow</h1>
    <p>Accedi alla dashboard bankroll.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="password" name="password" placeholder="Password dashboard" required>
      <button>Entra</button>
    </form>
  </main>
</body>
</html>
