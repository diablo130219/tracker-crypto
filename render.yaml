services:
  - type: web
    name: crypto-bankroll-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: APP_SECRET
        sync: false
      - key: TRACKER_API_TOKEN
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: STARTING_BANKROLL
        value: 1000
      - key: CURRENCY
        value: EUR
